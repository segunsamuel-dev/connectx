<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectX | Message</title>
    <link rel="stylesheet" href="chat.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet" />
</head>
<body class="light-mode">

    <div class="app-canvas">
        <aside class="rail">
            <div class="rail-top">
                <div class="rail-logo">CX<span>.</span></div>
            </div>

            <nav class="rail-center">
                <button class="rail-btn" onclick="window.location.href='dashboard.html'">
                    <i class="lni lni-grid-alt"></i>
                </button>
                <button class="rail-btn active">
                    <i class="lni lni-comments"></i>
                </button>
                <button class="rail-btn" onclick="window.location.href='settings.html'">
                    <i class="lni lni-cog"></i>
                </button>
            </nav>

            <div class="rail-bottom">
                <div class="rail-user-status" id="my-avatar-display">?</div>
            </div>
        </aside>

        <section class="navigator">
            <div class="nav-header">
                <h3>Messages</h3>
                <div class="search-container">
                    <i class="lni lni-search-alt"></i>
                    <input type="text" placeholder="Search chats..." id="contact-search">
                </div>
                <button class="add-friend-btn" id="add-friend-trigger" onclick="window.location.href='add.html'">
                    <i class="lni lni-plus"></i> ADD FRIEND
                </button>
            </div>
            
            <div class="contact-list" id="dynamic-contact-list">
                </div>
        </section>

        <main class="nexus" id="nexus-window">
            <header class="nexus-header" id="chat-header" style="display: none;">
                <div class="active-user">
                    <button class="mobile-back" id="close-chat"><i class="lni lni-arrow-left"></i></button>
                    
                    <div class="user-orb" id="active-orb">?</div>
                    <div>
                        <h4 id="active-username">Select a chat</h4>
                        <span class="sys-tag" id="active-status">// UPLINK_STABLE</span>
                    </div>
                </div>
                <div class="nexus-utils">
                    <button class="util-btn"><i class="lni lni-phone"></i></button>
                    <button class="util-btn"><i class="lni lni-more-alt"></i></button>
                </div>
            </header>

            <div class="chat-stream" id="chat-stream">
                <div class="empty-state">
                    <i class="lni lni-bubble" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.2;"></i>
                    <p>Select a contact to start connecting.</p>
                </div>
            </div>

            <footer class="nexus-input" id="input-area" style="display: none;">
                <div class="input-pill">
                    <button class="attach-btn"><i class="lni lni-paperclip"></i></button>
                    <input type="text" placeholder="Type a message..." id="message-input">
                    <button class="send-btn" id="send-btn"><i class="lni lni-pointer-top"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
