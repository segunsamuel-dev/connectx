<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectX | Login</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="auth-container">
        <section class="auth-sidebar">
            <div class="brand-wrapper">
                <div class="logo">Connect<span>X</span></div>
                <p class="tagline">Chat in real-time.<br>Stay connected.</p>
            </div>
            <div class="subtle-pattern"></div>
        </section>

        <section class="auth-main">
            <div class="auth-card">
                <header class="auth-header">
                    <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 5px;">Welcome Back</h2>
                    <p style="color: var(--text-muted); margin-bottom: 25px;">New to ConnectX? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create an account</a></p>
                </header>

                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="name@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="password-field">
                            <input type="password" id="login-password" placeholder="••••••••" required>
                            <span class="toggle-eye" onclick="togglePassword('login-password')">👁️</span>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-submit" id="login-btn">
                        <span class="btn-text">Login</span>
                    </button>
                </form>

                <div id="error-message" class="error-toast"></div>
            </div>
        </section>
    </main>
    
    <script type="module" src="auth.js"></script>
</body>
</html>
