<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectX | Join Now</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="auth-container">
        <section class="auth-sidebar">
            <div class="brand-wrapper">
                <div class="logo">Connect<span>X</span></div>
                <p class="tagline">Create an account.<br>Start your journey.</p>
            </div>
        </section>

        <section class="auth-main">
            <div class="auth-card">
                <header class="auth-header">
                    <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 5px;">Create Account</h2>
                    <p style="color: var(--text-muted); margin-bottom: 25px;">Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a></p>
                </header>

                <form id="signup-form" class="auth-form active">
                    <div class="input-group">
                        <label for="reg-user">Username</label>
                        <input type="text" id="reg-user" placeholder="YourName" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="name@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-pass">Password</label>
                        <input type="password" id="reg-pass" placeholder="Create password" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-confirm">Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="Confirm password" required>
                    </div>
                    
                    <button type="submit" class="btn-submit" id="signup-btn">
                        <span class="btn-text">Create Account</span>
                    </button>
                </form>

                <div id="error-message" class="error-toast"></div>
            </div>
        </section>
    </main>

    <script type="module" src="signup.js"></script>
</body>
</html>
