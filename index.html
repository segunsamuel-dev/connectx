<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectX | Connect Instantly. Chat Smarter.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav id="navbar">
        <div class="logo">Connect<span>X</span></div>
        <ul class="nav-links">
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="nav-cta">
            <button class="btn-glass" onclick="window.location.href='login.html'">Login</button>
            <button class="btn-hyper" onclick="window.location.href='signup.html'">Get Started</button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Connect Instantly.<br><span class="gradient-text">Chat Smarter.</span></h1>
            <p>Real-time messaging with powerful features for modern communication. Built for the next generation.</p>
            <div class="hero-btns">
                <button class="btn-primary" onclick="window.location.href='signup.html'">Get Started</button>
            </div>
        </div>

        <div class="hero-mockup">
            <div class="glass-card chat-window">
                <div class="chat-header">
                    <div class="user-info">
                        <div class="avatar online"></div>
                        <div class="name"> Mary <span class="status">typing...</span></div>
                    </div>
                </div>
                <div class="chat-body">
                    <div class="msg received">Hey! Movies @9 ? </div>
                    <div class="msg sent">yupppp chloe is coming</div>
                    <div class="msg received animate-pop">oh? yayyyyyyyy</div>
                </div>
                <div class="chat-input-sim">
                    <div class="placeholder">Type a message...</div>
                </div>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
